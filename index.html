<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Time Until Emilio Ordination</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    height: 100vh;
    height: 100dvh;

    font-family: "Comic Sans MS", "Comic Sans", cursive;
    color: white;

    background: radial-gradient(circle at top,
        #0b1b3a,
        #1a237e,
        #000);
}

/* glow overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,215,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.08), transparent 40%);
    pointer-events: none;
}

/* fireworks */
canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
}

/* MAIN LAYOUT */
.container {
    position: relative;
    z-index: 2;

    width: 100vw;
    height: 100vh;
    height: 100dvh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    gap: 15px;
    padding: 10px;
}

/* TITLE */
h1 {
    font-size: clamp(1.2rem, 3.5vw, 3rem);
    font-weight: normal;
    color: #f5f1e6;
    line-height: 1.2;
}

/* COUNTDOWN */
#countdown {
    font-size: clamp(1.6rem, 5vw, 5.5rem);
    font-weight: bold;
    white-space: nowrap;
    color: #fff8dc;
}

/* SACRED IMAGES (DESKTOP ONLY) */
.sacred {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
}

.sacred img {
    width: 220px;
    height: 350px;
    object-fit: cover;

    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.4);

    box-shadow:
        0 0 15px rgba(255,255,255,0.15),
        0 0 30px rgba(255,215,0,0.1);
}

.left {
    left: 40px;
}

.right {
    right: 40px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    body {
        overflow: hidden;
    }

    h1 {
        font-size: 1.3rem;
    }

    #countdown {
        font-size: 2rem;
        white-space: normal;
    }

    /* ❌ HIDE IMAGES COMPLETELY ON MOBILE */
    .sacred {
        display: none;
    }
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- DIVINE MERCY -->
<div class="sacred left">
    <img src="./Kazimirowski_Eugeniusz,_Divine_Mercy,_1934.jpg"
         alt="Divine Mercy">
</div>

<!-- OUR LADY OF GUADALUPE -->
<div class="sacred right">
    <img src="./Virgen_de_guadalupe1.jpg"
         alt="Our Lady of Guadalupe">
</div>

<div class="container">
    <h1>Time Until Emilio Ordination</h1>
    <div id="countdown">Loading...</div>
</div>

<script>
/* ================= COUNTDOWN ================= */

const targetDate = new Date("September 5, 2026 11:00:00").getTime();

function updateCountdown() {
    const now = Date.now();
    const diff = targetDate - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML =
            "🎉 Blessed Day Has Come 🎉";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

updateCountdown();
setInterval(updateCountdown, 1000);

/* ================= FIREWORKS ================= */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;

        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 2;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.alpha = 1;
        this.gravity = 0.02;
        this.friction = 0.985;
    }

    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;

        this.x += this.vx;
        this.y += this.vy;

        this.alpha -= 0.01;
    }

    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

const particles = [];

class Firework {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.targetY = Math.random() * canvas.height * 0.5;
        this.speed = Math.random() * 4 + 6;

        this.color = ["#fff","#ffd700","#c9d6ff","#f5f1e6"][Math.floor(Math.random()*4)];
    }

    update() {
        this.y -= this.speed;

        if (this.y <= this.targetY) {
            this.explode();
            this.dead = true;
        }
    }

    explode() {
        for (let i = 0; i < 90; i++) {
            particles.push(new Particle(this.x, this.y, this.color));
        }
    }
}

const fireworks = [];

setInterval(() => {
    fireworks.push(new Firework());
}, 300);

function animate() {
    requestAnimationFrame(animate);

    ctx.fillStyle = "rgba(0,0,0,0.22)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        if (fireworks[i].dead) fireworks.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].alpha <= 0) {
            particles.splice(i, 1);
        }
    }

    ctx.globalAlpha = 1;
}

animate();
</script>

</body>
</html>
